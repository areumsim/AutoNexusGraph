# CI — O-4 (BACKLOG §5 / README §12.3). keyless 게이트만 (DB·LLM·API 키 없이 통과).
#
# 게이트 = `make smoke-e2e` (pytest + mock audits: ontology / eval-matrix sim /
# mcp / ipgraph / trace sim / validate-gold-qa). 프로젝트 자체 pre-push 게이트와 동일.
#
# lint(ruff)·typecheck(mypy)·DoD dashboard 는 **informational** (저장소가 아직
# ruff-clean 아님 — 716건; DoD --strict 는 §10.7/§10.13 가 LLM eval 필요라
# keyless 불가). 키·DB 필요한 strict 게이트는 후속 (셀프호스티드 또는 secrets).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  # main 브랜치 run 은 취소하지 않는다 — 모든 머지 커밋이 CI 를 완주(녹색)해야 한다.
  # PR 브랜치만 cancel-in-progress (빠른 재push 시 직전 run 취소로 CI 절약).
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: smoke-e2e (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # PR 은 단일 버전(빠른 피드백), main push 는 전 버전 매트릭스(머지 시 철저 검증).
        python: ${{ github.event_name == 'pull_request' && fromJSON('["3.11"]') || fromJSON('["3.10", "3.11", "3.12"]') }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install (all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: smoke-e2e (keyless mock gate)
        run: make smoke-e2e

  lint:
    name: lint + typecheck (informational)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: ruff (informational — 저장소 아직 ruff-clean 아님)
        continue-on-error: true
        run: ruff check src tests scripts
      - name: mypy (informational)
        continue-on-error: true
        run: mypy src

  dod-dashboard:
    name: DoD dashboard (artifact, non-gating)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # core_diff baseline commit 필요
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install (all extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
      - name: audit-dod (non-strict report)
        continue-on-error: true
        run: make audit-dod
      - name: Upload DoD report
        uses: actions/upload-artifact@v4
        with:
          name: dod-dashboard
          path: |
            data/reports/dod_audit_*.md
            eval/reports/dod_*.md
          if-no-files-found: ignore
