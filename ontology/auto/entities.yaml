# AutoGraph 자동차 도메인 엔티티 정의 (SSOT).
#
# 본 파일은 src/autograph/ontology.py 가 로드해서:
#   - Neo4j 제약/인덱스 생성 (neo4j_init.py)
#   - LLM 프롬프트의 entity_types_table 주입 (extractors/prompts/relation_extract_auto.yaml)
#   - P4 cross-validate 의 schema 검증 (extractors/cross_validate.py)
# 에서 사용한다.
#
# 명세 규칙 (finance ontology 와 동일):
#   type           : Neo4j 라벨 (PascalCase)
#   key            : 자연 키 (없으면 내부 seq)
#   required       : 노드 생성 필수 속성
#   optional       : 보조 속성 (없어도 OK)
#   pg_table       : PG SSOT 테이블
#   provenance_src : 어디서 만들어지는지 (extractors.yaml 참조)
#   bom_level      : BOM 계층 (0..5). 없으면 사이드 홉.

version: 1
schema_version: "v2.2"   # PRD §10 DoD #17 (c) — 온톨로지 레벨 schema_version SoT
domain: automotive
last_updated: 2026-05-28

entities:

  Manufacturer:
    description: 완성차 OEM 또는 부품 제조사
    key: id                    # auto.master_manufacturers.manufacturer_id (BIGINT)
    bom_level: 0
    required: [id, name]
    optional:
      - name_norm
      - country
      - wikidata_qid
      - aliases
      - source
      - snapshot_year
    pg_table: auto.master_manufacturers
    provenance_src: [nhtsa_vpic, wikidata]

  VehicleModel:
    description: 차종 — 제조사 × 모델명 × 시장 단위.
    key: id                    # auto.master_vehicle_models.model_id (BIGSERIAL)
    bom_level: 1
    required: [id, name]
    optional:
      - name_norm
      - market
      - wikidata_qid
      - aliases
    pg_table: auto.master_vehicle_models
    provenance_src: [nhtsa_vpic, wikidata]

  VehicleVariant:
    description: 트림/연식 — (model_id, model_year, trim, fuel_type) 단위.
    key: id                    # auto.master_vehicle_variants.variant_id (BIGSERIAL)
    bom_level: 2
    required: [id]
    optional:
      - model_year
      - trim
      - fuel_type
      - body_class
      - drive_type
      - transmission
    pg_table: auto.master_vehicle_variants
    provenance_src: [nhtsa_vpic, nhtsa_canspec]

  System:
    description: |
      차량 시스템 (Level 3) — 파워트레인 / ADAS / 브레이크 / 차체 / 전장 …
      코드는 system_taxonomy.yaml 에서 SSOT.
    key: code                  # 대문자 SCREAMING_SNAKE (예 POWERTRAIN, BRAKE)
    bom_level: 3
    required: [code, name]
    optional: [description, parent_code]
    pg_table: auto.components             # level=3 row
    provenance_src: [system_taxonomy_seed, aihub]

  Module:
    description: 시스템 내 모듈 (Level 4) — 가솔린 엔진, 배터리 팩, ABS 모듈 등.
    key: id                    # auto.components.component_id (level=4)
    bom_level: 4
    required: [id, name]
    optional:
      - name_norm
      - system_code
      - aliases
      - wikidata_qid
    pg_table: auto.components
    provenance_src: [aihub, recall_component_match, llm_p3]

  Part:
    description: 부품 (Level 5) — 인젝터, BMS, 인플레이터 등.
    key: id                    # auto.components.component_id (level=5)
    bom_level: 5
    required: [id, name]
    optional:
      - name_norm
      - parent_module_id
      - aliases
      - wikidata_qid
    pg_table: auto.components
    provenance_src: [recall_component_match, llm_p3]

  Supplier:
    description: 부품 공급사 (Tier1/2). bridge.corp_entity 에서 supplier_id 발급.
    key: entity_id             # stringified supplier_id (auto.master_suppliers.supplier_id)
    required: [entity_id, name]
    optional:
      - name_norm
      - country
      - wikidata_qid
      - corp_code              # 한국 상장사일 때만 — Cross-Domain Bridge 진입점
      - match_method
      - confidence_score
    pg_table: auto.master_suppliers
    provenance_src: [wikidata_suppliers, bridge_corp_entity]

  Recall:
    description: 리콜 캠페인 (NHTSA / KOTSA / KATRI).
    key: id                    # auto.events_recalls.recall_id (BIGSERIAL)
    required: [id, source, source_recall_no]
    optional:
      - report_date
      - country
      - component_text          # 원문 (정규화 전)
      - summary
      - consequence
      - remedy
      - affected_units
      - snapshot_year
    pg_table: auto.events_recalls
    provenance_src: [nhtsa_recalls, car_go_kr_recalls]

  Complaint:
    description: 소비자 결함신고 — NHTSA Complaints.
    key: id                    # auto.events_complaints.complaint_id
    required: [id, source, source_complaint_no]
    optional:
      - filed_date
      - incident_date
      - summary
      - country
    pg_table: auto.events_complaints
    provenance_src: [nhtsa_complaints]

  Investigation:
    description: |
      NHTSA ODI 결함 조사 (리콜 전단계). NHTSA_ACTION_NUMBER 단위 (예 PE12001).
      investigation_type 필드: PE/EA/RQ/AQ/DP — action_number 앞 2글자.
    key: id                    # auto.events_investigations.investigation_id
    required: [id, source, action_number]
    optional:
      - investigation_type
      - opened_date
      - closed_date
      - subject
      - summary
      - campno                 # 종결된 리콜 캠페인 (있을 때)
      - mfr_name
      - country
      - snapshot_year
    pg_table: auto.events_investigations
    provenance_src: [nhtsa_odi_investigations]

  Standard:
    description: 안전·환경·인증 규격 (FMVSS / KS R / ECE / NCAP / KNCAP …).
    key: code                  # 대문자 표준 코드
    required: [code, name]
    optional: [region, agency, url]
    pg_table: null              # YAML seed (ontology/auto/standards.yaml)
    provenance_src: [standards_seed]

  Plant:
    description: 생산공장 (Hyundai Ulsan / Kia Hwaseong 등).
    key: code                  # 'HYU_ULSAN' 같은 인공 코드
    required: [code, name]
    optional:
      - manufacturer_id
      - country
      - city
      - wikidata_qid
    pg_table: null              # YAML seed (ontology/auto/plants.yaml)
    provenance_src: [plants_seed, wikidata]

  Material:
    description: |
      소재 (Level 6) — 두 갈래:
        (a) 배터리 chem: NCM811 / NCM622 / NCA / LFP / LMFP — Cell cathode chemistry.
        (b) 금속 합금: A356/6061/7075 (Al), DP980/HSS (강), Ti6Al4V — 차체/구조 부품.
      두 카테고리 모두 같은 :Material 노드 라벨. `material_class` 로 구분.
      SSOT: (a) materials_seed.yaml · (b) materials_metals_seed.yaml.
    key: code                  # 'NCM811' / 'A356' / 'DP980' 같은 SCREAMING 코드
    bom_level: 6
    required: [code, name]
    optional:
      - cathode_ratio          # (a) chem '8:1:1' 등
      - chem_family            # (a) 'NCM' | 'NCA' | 'LFP' | 'LMFP'
      - aliases
      - material_class         # 'cathode_chem' | 'metal_alloy' | 'polymer' | …
      - alloy_family           # (b) 'Al-Si' | 'Al-Mg' | 'AHSS' | 'Ti'
      - typical_processes      # (b) process_name_norm list — 보통 가공되는 공정 카테고리
      - typical_modules        # (b) 보통 사용되는 :Module name list (body/wheel 등)
      - density_kg_m3          # (b) 물성 메타 (선택)
    pg_table: null              # YAML seed (materials_seed + materials_metals_seed)
    provenance_src: [materials_seed, materials_metals_seed, wikidata]

  Mineral:
    description: |
      핵심광물 (Level 6 광물 끝단) — Li/Ni/Co/Mn/Graphite. USGS MCS 공식 통계 SSOT.
      년 단위 세계·미국 생산·수입·가격·매장량은 `auto.master_minerals` PG 테이블에.
    key: code                  # 'Li' | 'Ni' | 'Co' | 'Mn' | 'Graphite'
    bom_level: 6
    required: [code, name]
    optional:
      - element_symbol         # 화학 기호 (Li 같은 단원소만)
      - aliases
    pg_table: auto.master_minerals
    provenance_src: [usgs_mcs]

  # ── BoP (공정 축) — ProcessGraph (PRD_process_graph §3.1) ────────────
  # BoM ⟂ BoP 직교 확장. Process=공정유형(taxonomy, 산단공 합성·grade C),
  # ProcessStep=부품별 공정 단계(인스턴스), Equipment=설비. Material/Plant 는
  # 위에 이미 정의 — 재정의 금지. 회사 귀속 엣지(PERFORMED_AT)는 DART/팩토리온만.
  Process:
    description: |
      제조 공정 유형 (taxonomy) — 전처리/도장/용접/조립/검사 등. 산단공 합성
      공정사전(datagokr 15151075) 의 정규화 공정명(process_name_norm) 1 건 = 1 노드.
      grade C (합성·0.50) — taxonomy 전용, 확정 사실 금지.
    key: process_name_norm     # auto.processes.process_name_norm (정규형, ≈410 distinct)
    required: [process_name, process_name_norm]
    optional:
      - process_map_name       # 공정도명 (예: '자동차 내장 부품 제조 생산공정')
      - industry_code          # KSIC
      - category               # casting|forging|stamping|welding|coating|machining|assembly|inspection
    pg_table: auto.processes
    provenance_src: [datagokr_15151075]

  ProcessStep:
    description: |
      부품별 공정 단계 (순서 있음) — BoP 인스턴스. (:Part)-[:PRODUCED_BY]->(:ProcessStep)
      -[:PRECEDES]->... 경로가 "이 부품을 만드는 공정 순서". cycle_time/yield 통계는
      KAMP/AI Hub(익명·B) 출처 — 회사 비귀속.
    key: step_id               # 인공 키 (part_id + seq + process_name_norm 합성)
    required: [step_id]
    optional:
      - seq                    # 공정 순서 (process_order)
      - process_name_norm      # INSTANTIATES 대상 Process 키
      - part_id                # PRODUCED_BY 대상 Part
      - cycle_time             # 패턴(익명) — 회사 비귀속
      - yield_rate             # 패턴(익명) — 회사 비귀속
    pg_table: null             # 인스턴스 (DART 공정도설명 + 산단공 매칭, Step 3)
    provenance_src: [dart_business_report, datagokr_15151075]

  Equipment:
    description: |
      설비/장비 (로봇팔·용접기·도장시설 등). ProcessStep 이 사용하는 자원(side hop).
      본 단계는 스키마만 — 인스턴스 적재는 후속(scaffold).
    key: code                  # 'WELDING_ROBOT' 같은 인공 코드
    required: [code, name]
    optional:
      - type
      - ksic_code
    pg_table: null
    provenance_src: [process_seed]
