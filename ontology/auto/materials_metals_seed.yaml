# AutoGraph 금속 합금 (Level 6 — Material, metal_alloy 분기) seed.
#
# 배터리 cathode chemistry (materials_seed.yaml) 와 같은 :Material 노드 라벨이지만
# `material_class: metal_alloy` 로 구분. 자동차 차체·구조·외장 부품용 핵심 alloy 만 시드.
#
# 분기:
#   - Al alloy 4 (A356/6061/7075/5083) — 다이캐스팅·압출·항공·해양
#   - 강 합금 4 (DP980/CR980/HSS_Boron/SS304) — 차체 hot stamping + 배기
#   - Ti 1 (Ti6Al4V) — 항공·고성능 (제한적 사용)
#
# Module 매핑은 BoM L4 module name 으로 직접 매칭 (예: '차체 외판'/'휠/타이어').
# Module 의 정식 시드는 part_seed.yaml + load_auto_aihub.py. 본 시드는 typical_modules
# 힌트만 — loader 가 :Module name 매칭 시 MADE_OF 후보 생성 (grade B, manual seed).
#
# 출처 (SSOT):
#   - 합금 명세: SAE/JIS/KS 규격 (공공 표준명, CC0 효력)
#   - typical_processes: KAMP 카탈로그(15089213) 의 process_category 8 + 확장.
#
# 등급: B (manual seed, 표준 규격 기반). loader 가 적재 시 MADE_OF 엣지는 candidate 0.50
# (Module 매칭은 추론) — 확정 출처 들어오면 validated 격상.

version: 1
last_updated: 2026-06-05

