# ── Module → Material (MADE_OF) 매핑 ─────────────────────────────
# materials_seed.yaml 의 배터리팩↔NCM 패턴과 동일. loader 매칭은 :Module name 으로.
# 매칭 없으면 graceful skip — 매핑은 hint, 실제 적재는 :Module 노드 존재 시.
#
# (참고) 매핑 정확도는 grade B (manual seed). 실제 OEM-specific 정확도는 IR/MSDS 출처
# 들어오면 격상. 다중 alloy 가능 모듈은 list 로.
module_to_materials:
  - module_name: "차체 외판"
    materials: [DP980, CR980, AL_5083]
  - module_name: "B-필러"
    materials: [DP980, HSS_BORON]
  - module_name: "센터 필러"
    materials: [HSS_BORON, DP980]
  - module_name: "도어 임팩트빔"
    materials: [HSS_BORON]
  - module_name: "도어 프레임"
    materials: [AL_6061, DP980]
  - module_name: "엔진 블록"
    materials: [A356]
  - module_name: "변속기 케이스"
    materials: [A356]
  - module_name: "휠/타이어"
    materials: [A356]
  - module_name: "서브프레임"
    materials: [A356, AL_6061]
  - module_name: "범퍼 보강재"
    materials: [AL_6061, DP980]
  - module_name: "서스펜션 암"
    materials: [AL_7075, DP980]
  - module_name: "배터리 트레이"
    materials: [AL_5083, AL_6061]
  - module_name: "배기 시스템"
    materials: [SS304]
  - module_name: "촉매 컨버터"
    materials: [SS304]
  # Ti (niche / 고성능)
  - module_name: "밸브 (고성능)"
    materials: [TI_6AL_4V]
  - module_name: "스프링 (경량)"
    materials: [TI_6AL_4V, AL_7075]


# ── Process 카테고리 보강 (참고) ─────────────────────────────────
# typical_processes 에서 사용되는 process_name_norm 가 KAMP catalog 또는
# load_kamp_catalog._PROCESS_NORM 에 정의된 카테고리와 일관해야 한다. 본 seed 가
# 사용한 process_name_norm 목록:
#   - die_casting (casting)
#   - cold_forging / forging (forging)
#   - press / stamping / hot_stamping (stamping)
#   - welding (welding)
#   - machining / cnc_machining / extrusion (machining)
#   - heat_treatment (heat_treatment)
# `extrusion` 과 `hot_stamping` 은 본 seed 가 신규 도입 (KAMP catalog 에는 없음).
# loader 작성 시 :Process 매칭은 process_name_norm 완전일치 — 미존재 process 는
# 새 :Process 노드 MERGE (category 추론 = stamping/machining).
