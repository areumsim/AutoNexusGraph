# P3 IR/뉴스룸 본문 관계 추출 프롬프트.
#
# 대상 문서: auto.events_oem_news.body_text — Hyundai IR 자료 등.
# 발견 가능 사실: 공장별 생산능력 / 모델 배정 / 가동 시점 / 신차 출시.
#
# DART 사업보고서 III. 생산·설비 정형 파서 (load_dart_production.py) 가 이미
# capacity/production/utilization 표를 자동 추출. 본 LLM 추출은 그 외 의
# 서술형 사실 — "신규 EV 전용 공장 가동", "차세대 모델 배정" 등.
#
# 출력은 JSON Schema 강제 → LLMClient.chat_json() 으로 호출.

version: 1
last_updated: 2026-06-01

# 본 추출 패스에서 활성화된 관계.
target_relations:
  - MANUFACTURED_AT     # 모델 ↔ 공장
  - CAPACITY_REPORTED   # 공장 capacity 보고 (DART 외 IR 보강용)

target_entity_kinds:
  - Manufacturer
  - VehicleModel
  - Plant
  - Module    # 신규 모델 배정 발표에서 가끔 등장

system: |
  당신은 자동차 OEM IR/뉴스룸 자료의 사실 추출 전문가입니다.
  공장 배정, 생산능력, 신차 출시 발표 본문에서 다음 두 관계만 추출하세요.

  허용 관계 (이외 추출 금지):
    MANUFACTURED_AT  : 어떤 차량모델(VehicleModel)이 어느 공장(Plant)에서 생산되는가
    CAPACITY_REPORTED: 어느 공장(Plant)이 어떤 capacity (대/년) 를 보고했는가

  엄격 규칙:
    1. 본문에 명시적으로 언급된 사실만 추출. 추론 금지.
    2. 공장은 정확한 plant_name (예: '울산공장', 'HMC', 'Montgomery plant').
    3. 모델은 자동차 모델 정식명 ('소나타 DN8', 'IONIQ 5', 'EV6' 등 — 약어 'EV' 단독은 금지).
    4. CAPACITY 는 정확한 숫자 + 단위:
       - "연간 200,000대" / "1.8 million units per year" 처럼 명시적 수치만.
       - "확장 계획" / "증설 예정" 같은 미확정 수치는 confidence < 0.6.
       - 단위가 분명치 않으면 confidence < 0.7.
    5. 본문이 IR 공시 (분기실적·공시자료) 면 신뢰도 0.9+. 일반 보도자료는 0.7~0.85.
    6. 본문에 관계가 없으면 빈 리스트.

  Anti-pattern (절대 추출 금지):
    - "글로벌 생산 800만대" — 전체 회사 합계는 plant 단위 아님 → CAPACITY_REPORTED 아님
    - "주요 차종" 의 OEM 합계 매출 — 재무, 본 관계 아님
    - 미래 시점 ("2030년까지 1000만대") — 본 PR 은 현재/과거 사실만

  반드시 다음 JSON 스키마로만 응답:
  {
    "entities": [...],
    "relations": [
      {
        "type": "MANUFACTURED_AT" | "CAPACITY_REPORTED",
        "head": str, "head_kind": "VehicleModel"|"Plant",
        "tail": str, "tail_kind": "Plant"|"Manufacturer",
        "evidence": str, "confidence": 0.0~1.0,
        "attributes": { "capacity_units": int, "snapshot_year": int }
      }
    ]
  }

user_template: |
  [OEM IR/뉴스룸 본문 추출 컨텍스트]
    oem={oem} ({oem_name})
    section={section}
    title={title}
    url={url}
    published_date={published_date}

  [본문]
  {chunk_text}

  위 본문에서 MANUFACTURED_AT 와 CAPACITY_REPORTED 관계만 추출. 본문에 명시적
  으로 적힌 사실만 — 추론·미래시점 제외. 본 본문이 IR 공시면 confidence 0.9+,
  보도자료면 0.7~0.85. 본문에 관계가 없으면 빈 list.

# JSON schema — chat_json() 가 enforce.
json_schema:
  type: object
  required: [relations]
  properties:
    entities:
      type: array
      items:
        type: object
        properties:
          name: {type: string}
          kind:
            type: string
            enum: [Manufacturer, VehicleModel, Plant, Module]
          alias: {type: array, items: {type: string}}
    relations:
      type: array
      items:
        type: object
        required: [type, head, tail, confidence]
        properties:
          type: {type: string, enum: [MANUFACTURED_AT, CAPACITY_REPORTED]}
          head: {type: string}
          head_kind: {type: string, enum: [VehicleModel, Plant]}
          tail: {type: string}
          tail_kind: {type: string, enum: [Plant, Manufacturer]}
          evidence: {type: string}
          confidence: {type: number, minimum: 0.0, maximum: 1.0}
          attributes:
            type: object
            properties:
              capacity_units: {type: integer, minimum: 0}
              snapshot_year: {type: integer, minimum: 1900, maximum: 2100}
