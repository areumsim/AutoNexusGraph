# Prometheus scrape config (O-5). docker-compose.prod.yml 의 prometheus 서비스가 마운트.
global:
  scrape_interval: 30s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: autonexusgraph
    metrics_path: /metrics
    static_configs:
      - targets: ["anxg-metrics:9105"]   # compose 서비스명 (metrics exporter)
